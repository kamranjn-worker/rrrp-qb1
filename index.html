<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qara Bazar</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0f;--bg2:#141417;--bg3:#1c1c21;--bg4:#24242b;
  --border:#2e2e38;--border2:#3a3a48;
  --text:#f0f0f5;--text2:#9898b0;--text3:#5a5a72;
  --blue:#4a9eff;--blue-bg:#0e1e35;--blue-border:#1a3560;
  --green:#3ecf7a;--green-bg:#0b2018;--green-border:#163d28;
  --red:#ff5f5f;--red-bg:#2a0e0e;--red-border:#4a1a1a;
  --amber:#f59e0b;--amber-bg:#1f1407;--amber-border:#3d2a0a;
  --coral:#ff7043;--coral-bg:#221008;--coral-border:#3d1e0e;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:2rem 1.5rem}
#app{max-width:1200px;margin:0 auto}

.topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:14px;margin-bottom:2rem}
.title-block{display:flex;align-items:baseline;gap:14px}
.title-block h1{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:2px;color:var(--text);font-weight:400}
.update-badge{font-size:11px;color:var(--text3);background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:4px 12px;letter-spacing:.04em}
.search-wrap{position:relative;flex:1;min-width:180px;max-width:300px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--text3);fill:none}
.search-wrap input{width:100%;padding:9px 14px 9px 34px;border:1px solid var(--border);border-radius:10px;background:var(--bg3);color:var(--text);font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--blue)}
.search-wrap input::placeholder{color:var(--text3)}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:1.5rem}
.scard{background:var(--bg2);border-radius:12px;padding:14px 16px;border:1px solid var(--border);border-left:3px solid var(--border2)}
.scard.blue{border-left-color:var(--blue)}
.scard.green{border-left-color:var(--green)}
.scard.amber{border-left-color:var(--amber)}
.scard.coral{border-left-color:var(--coral)}
.scard-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.scard-val{font-size:20px;font-weight:500;color:var(--text);line-height:1.2}
.scard-sub{font-size:11px;color:var(--text3);margin-top:3px}

.filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.5rem;align-items:center}
.fbtn{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .15s;white-space:nowrap}
.fbtn:hover{border-color:var(--border2);color:var(--text)}
.fbtn.on{background:var(--bg4);border-color:var(--border2);color:var(--text);font-weight:500}
.sort-wrap{margin-left:auto;display:flex;align-items:center;gap:8px}
.sort-wrap label{font-size:12px;color:var(--text3)}
.sort-wrap select{font-size:12px;padding:5px 10px;border:1px solid var(--border);border-radius:8px;background:var(--bg3);color:var(--text2);cursor:pointer;font-family:'DM Sans',sans-serif;outline:none}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
.item-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;transition:border-color .2s,transform .15s;position:relative;overflow:hidden}
.item-card:hover{border-color:var(--border2);transform:translateY(-2px)}
.item-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.cat-qara::before{background:var(--blue)}
.cat-silah::before{background:var(--green)}
.cat-soygun::before{background:var(--coral)}

.card-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px}
.card-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.cat-qara .card-icon{background:var(--blue-bg);border:1px solid var(--blue-border)}
.cat-silah .card-icon{background:var(--green-bg);border:1px solid var(--green-border)}
.cat-soygun .card-icon{background:var(--coral-bg);border:1px solid var(--coral-border)}

.trend-pill{font-size:11px;font-weight:500;padding:3px 9px;border-radius:10px}
.tp-up{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.tp-dn{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.tp-st{background:var(--bg3);color:var(--text3);border:1px solid var(--border)}

.card-name{font-size:14px;font-weight:500;color:var(--text);margin-bottom:3px;line-height:1.3}
.card-cat{font-size:11px;color:var(--text3);margin-bottom:12px}
.card-prices{display:grid;grid-template-columns:1fr 1fr;gap:8px 6px}
.cp-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.cp-val{font-size:13px;font-weight:500;color:var(--text)}
.cp-val.green{color:var(--green)}
.cp-val.muted{color:var(--text2);font-weight:400}
.card-divider{height:1px;background:var(--border);margin:12px 0 10px}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.qp-val{font-size:11px;color:var(--text3)}
.btc-val{font-size:11px;color:var(--text2);background:var(--bg3);border:1px solid var(--border);padding:2px 8px;border-radius:8px}
.no-res{text-align:center;padding:4rem;color:var(--text3);font-size:14px;grid-column:1/-1}
.empty-state{text-align:center;padding:5rem 2rem;color:var(--text3)}
.empty-state p{font-size:15px;margin-top:8px}
.footer-bar{margin-top:3rem;padding-top:1rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.footer-bar span{font-size:12px;color:var(--text3)}
.admin-link{font-size:12px;color:var(--text3);text-decoration:none;padding:4px 12px;border:1px solid var(--border);border-radius:8px;transition:all .15s}
.admin-link:hover{color:var(--text2);border-color:var(--border2)}
</style>
</head>
<body>
<div id="app">
  <div class="topbar">
    <div class="title-block">
      <h1>QARA BAZAR</h1>
      <span class="update-badge" id="updateBadge">Yüklənir...</span>
    </div>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Mal axtar..." oninput="render()">
    </div>
  </div>

  <div class="stats-row" id="statsRow"></div>

  <div class="filters">
    <button class="fbtn on" onclick="setcat('Hamısı',this)">Hamısı</button>
    <button class="fbtn" onclick="setcat('Qara bazar',this)">Qara bazar</button>
    <button class="fbtn" onclick="setcat('Silah materialı',this)">Silah materialı</button>
    <button class="fbtn" onclick="setcat('Soyğun avadanlığı',this)">Soyğun avadanlığı</button>
    <div class="sort-wrap">
      <label>Sırala:</label>
      <select id="sortSel" onchange="render()">
        <option value="usd_d">Qiymət ↓</option>
        <option value="usd_a">Qiymət ↑</option>
        <option value="net_d">Net ↓</option>
        <option value="diff_d">Fərq ↓</option>
        <option value="trend_d">Trend ↓</option>
        <option value="name_a">Ad A–Z</option>
      </select>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="footer-bar">
    <span id="footerCount"></span>
    <a href="admin.html" class="admin-link">Admin Panel</a>
  </div>
</div>

  {name:'Soyğun qazması',cat:'Soyğun avadanlığı',icon:'⛏️',btc:75,usd:7500,net:4875,qara:4311,diff:3189,trend:0},
  {name:'Möhkəm kəndir',cat:'Soyğun avadanlığı',icon:'🪢',btc:17,usd:1700,net:1105,qara:977,diff:723,trend:-5.6},
  {name:'Qaz maskası',cat:'Soyğun avadanlığı',icon:'😷',btc:19,usd:1900,net:1235,qara:1092,diff:808,trend:-5.0},
  {name:'Kilid açarı',cat:'Soyğun avadanlığı',icon:'🗝️',btc:2.1,usd:210,net:137,qara:121,diff:89,trend:5.0},

const CAT_CLS={'Qara bazar':'cat-qara','Silah materialı':'cat-silah','Soyğun avadanlığı':'cat-soygun'};
let activeCat='Hamısı';

function getItems(){
  try{
    const s=localStorage.getItem('qb_items');
    return s?JSON.parse(s):DEFAULT_ITEMS;
  }catch(e){return DEFAULT_ITEMS;}
}

function getLastUpdate(){
  return localStorage.getItem('qb_lastupdate')||'—';
}

function setcat(c,btn){
  activeCat=c;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function trendPill(t){
  if(t>0)return`<span class="trend-pill tp-up">+${t}%</span>`;
  if(t<0)return`<span class="trend-pill tp-dn">${t}%</span>`;
  return`<span class="trend-pill tp-st">sabit</span>`;
}

function render(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const sv=document.getElementById('sortSel').value;
  const ITEMS=getItems();
  let data=ITEMS.filter(i=>{
    const mc=activeCat==='Hamısı'||i.cat===activeCat;
    const mq=!q||i.name.toLowerCase().includes(q)||i.cat.toLowerCase().includes(q);
    return mc&&mq;
  });
  const sorts={
    usd_d:(a,b)=>b.usd-a.usd,usd_a:(a,b)=>a.usd-b.usd,
    net_d:(a,b)=>b.net-a.net,diff_d:(a,b)=>b.diff-a.diff,
    trend_d:(a,b)=>b.trend-a.trend,name_a:(a,b)=>a.name.localeCompare(b.name)
  };
  data.sort(sorts[sv]);

  document.getElementById('updateBadge').textContent='Yenilənmə: '+getLastUpdate();

  const grid=document.getElementById('grid');
  if(!data.length){
    grid.innerHTML='<div class="no-res">Nəticə tapılmadı</div>';
    updateStats([]);
    document.getElementById('footerCount').textContent='';
    return;
  }

  grid.innerHTML=data.map(i=>`
    <div class="item-card ${CAT_CLS[i.cat]||''}">
      <div class="card-head">
        <div class="card-icon">${i.icon||'📦'}</div>
        ${trendPill(i.trend)}
      </div>
      <div class="card-name">${i.name}</div>
      <div class="card-cat">${i.cat}</div>
      <div class="card-prices">
        <div><div class="cp-label">Qiymət</div><div class="cp-val">$${i.usd.toLocaleString()}</div></div>
        <div><div class="cp-label">Net</div><div class="cp-val">$${i.net.toLocaleString()}</div></div>
        <div><div class="cp-label">Fərq</div><div class="cp-val green">$${i.diff.toLocaleString()}</div></div>
        <div><div class="cp-label">Qara Pul</div><div class="cp-val muted">${i.qara.toLocaleString()} QP</div></div>
      </div>
      <div class="card-divider"></div>
      <div class="card-footer">
        <span class="qp-val">${i.qara.toLocaleString()} QP</span>
        ${i.btc>0?`<span class="btc-val">BTC ${i.btc}</span>`:'<span class="btc-val">—</span>'}
      </div>
    </div>
  `).join('');

  updateStats(data);
  document.getElementById('footerCount').textContent=data.length+' mal göstərilir';
}

function updateStats(data){
  if(!data.length){document.getElementById('statsRow').innerHTML='';return;}
  const total=data.length;
  const avgNet=Math.round(data.reduce((s,i)=>s+i.net,0)/data.length);
  const rising=data.filter(i=>i.trend>0).length;
  const falling=data.filter(i=>i.trend<0).length;
  const best=data.slice().sort((a,b)=>b.diff-a.diff)[0];
  document.getElementById('statsRow').innerHTML=`
    <div class="scard blue"><div class="scard-label">Mal sayı</div><div class="scard-val">${total}</div></div>
    <div class="scard green"><div class="scard-label">Ort. net qiymət</div><div class="scard-val">$${avgNet.toLocaleString()}</div></div>
    <div class="scard amber"><div class="scard-label">Qiymət artan</div><div class="scard-val" style="color:var(--green)">${rising}</div><div class="scard-sub">Eniş: ${falling}</div></div>
    <div class="scard coral"><div class="scard-label">Ən gəlirli</div><div class="scard-val" style="font-size:14px">${best.name}</div><div class="scard-sub">$${best.diff.toLocaleString()} fərq</div></div>
  `;
}

render();
</script>
</body>
</html>
